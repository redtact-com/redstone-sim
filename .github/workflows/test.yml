# 基本 CI (issue #25)
# PR と main/develop への push で vitest (実機 fixture 回帰含む)・typecheck・build を回す。
# 実機 Minecraft は不要 (fixture はコミット済みの期待値で検証する。tools/mc-harness 参照)。

name: Test

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 依存インストール
        run: npm ci

      - name: vitest (単体 + 実機 ground truth fixture)
        run: npx vitest run

      - name: typecheck
        run: npm run typecheck

      - name: build
        run: npm run build
